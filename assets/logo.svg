<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260">
  <!-- Wordmark only, no background: first char is a mirrored "?" (hook opens
       to the right) with a horizontal bar through its stem, reading as "F" -->
  <g fill="none" stroke="#06B6D4" stroke-width="30"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- mirrored question-mark hook + stem -->
    <path d="M138.3,57.9
             C124.8,41.8 102.7,35.8 82.9,43
             C63.1,50.2 50,69 50,90
             C50,111 63.1,129.8 82.9,137
             C102.7,144.2 124.8,138.2 138.3,122.1
             Q125,148 103,160
             L103,195"/>
    <!-- horizontal bar through the stem, evoking "F" -->
    <path d="M65,153 L143,153"/>
  </g>
  <circle cx="103" cy="225" r="12" fill="#06B6D4"/>

  <text x="165" y="205"
        font-family="PlayfairDisplay, 'Playfair Display', Georgia, serif"
        font-style="italic" font-weight="600" font-size="150"
        fill="#06B6D4">arketmez</text>
</svg>
