<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>

  <!-- Gradient background (rounded square) -->
  <rect width="512" height="512" rx="110" fill="url(#g)"/>

  <!-- White location pin: circle top + tapered wings to tip -->
  <circle cx="256" cy="196" r="122" fill="white"/>
  <path fill="white" d="M 140 240 Q 144 348 256 434 Q 368 348 372 240 Z"/>

  <!-- Gradient inner circle — creates depth inside the pin -->
  <circle cx="256" cy="192" r="76" fill="url(#gi)"/>

  <!-- Fork (left) -->
  <rect x="204" y="140" width="7" height="53" rx="3.5" fill="white"/>
  <rect x="219" y="140" width="7" height="53" rx="3.5" fill="white"/>
  <rect x="234" y="140" width="7" height="53" rx="3.5" fill="white"/>
  <rect x="204" y="187" width="37" height="7" rx="3.5" fill="white"/>
  <rect x="215" y="194" width="7" height="58" rx="3.5" fill="white"/>

  <!-- Knife (right): blade + bolster + handle -->
  <path fill="white" d="M 271 140 L 271 190 L 288 190 Q 300 164 286 140 Z"/>
  <rect x="269" y="188" width="21" height="7" rx="3" fill="white"/>
  <rect x="274" y="195" width="7" height="57" rx="3.5" fill="white"/>
</svg>
