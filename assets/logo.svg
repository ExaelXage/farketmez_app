<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
  </defs>

  <!-- Gradient background (rounded square) -->
  <rect width="512" height="512" rx="110" fill="url(#g)"/>

  <!-- White location pin: bulbous circle top + wings narrowing to tip -->
  <circle cx="256" cy="196" r="122" fill="white"/>
  <path fill="white" d="M 140 242 Q 144 350 256 434 Q 368 350 372 242 Z"/>

  <!-- Inner gradient circle — depth effect inside pin -->
  <circle cx="256" cy="192" r="78" fill="url(#gi)"/>

  <!-- 5-pointed star centered at (256,169) outer-r=46 inner-r=19
       Outer: (256,123) (299,154) (283,203) (229,203) (213,154)
       Inner (interleaved): (271,154) (276,174) (256,188) (236,174) (241,154) -->
  <polygon
    points="256,123 271,154 299,154 276,174 283,203 256,188 229,203 236,174 213,154 241,154"
    fill="white"/>
</svg>
