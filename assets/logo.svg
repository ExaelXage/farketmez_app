  <!-- Dark navy background banner -->
  <rect width="720" height="260" rx="42" fill="#0F172A"/>

  <!-- Wordmark: "f" curls into a "?" at its foot, then reads on as "arketmez" -->
  <g fill="none" stroke="#06B6D4" stroke-width="20"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M125,58 Q97,50 95,80 L95,140 Q162,144 150,180 Q134,208 94,218"/>
    <path d="M65,92 L120,92"/>
  </g>
  <circle cx="94" cy="235" r="9" fill="#06B6D4"/>

  <text x="195" y="140"
        font-family="Roboto, 'Segoe UI', Arial, sans-serif"
        font-size="104" font-weight="600"
        fill="#FFFFFF" letter-spacing="1">arketmez</text>
</svg>
