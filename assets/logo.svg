<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="1024" height="1024" rx="220" ry="220"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>

  <!-- Location pin (white, drop shadow) -->
  <path filter="url(#shadow)"
        fill="white"
        d="M 512 165
           C 375 165 260 280 260 420
           C 260 510 305 590 372 648
           L 512 858
           L 652 648
           C 719 590 764 510 764 420
           C 764 280 649 165 512 165 Z"/>

  <!-- Inner gradient circle — recreates the background inside the pin hole -->
  <circle cx="512" cy="408" r="152" fill="url(#inner)"/>

  <!-- ── Fork (left of center) ── -->
  <!-- Tine 1 -->
  <rect x="446" y="296" width="13" height="82" rx="6" fill="white"/>
  <!-- Tine 2 -->
  <rect x="474" y="296" width="13" height="82" rx="6" fill="white"/>
  <!-- Tine 3 -->
  <rect x="502" y="296" width="13" height="82" rx="6" fill="white"/>
  <!-- Fork connector -->
  <rect x="446" y="368" width="69" height="13" rx="6" fill="white"/>
  <!-- Fork handle -->
  <rect x="471" y="381" width="13" height="118" rx="6" fill="white"/>

  <!-- ── Knife (right of center) ── -->
  <!-- Blade (slightly wider at top, tapers down) -->
  <path fill="white"
        d="M 542 296
           Q 542 296 542 296
           L 542 376
           Q 576 362 582 330
           Q 582 306 562 296 Z"/>
  <!-- Knife bolster -->
  <rect x="538" y="374" width="22" height="12" rx="4" fill="white"/>
  <!-- Handle -->
  <rect x="542" y="386" width="14" height="113" rx="7" fill="white"/>
</svg>
