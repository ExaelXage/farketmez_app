<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <filter id="shadow" x="-22%" y="-12%" width="144%" height="144%">
      <feDropShadow dx="0" dy="10" stdDeviation="18"
        flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Gradient background (rounded square / launcher icon) -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- White location pin: circle head + smooth teardrop tail (grouped for unified shadow) -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="200" r="128" fill="white"/>
    <path d="M 140 260 Q 192 435 256 450 Q 320 435 372 260 Z" fill="white"/>
  </g>

  <!-- Inner gradient circle — depth effect inside pin head -->
  <circle cx="256" cy="200" r="80" fill="url(#inner)"/>

  <!-- White bold question mark, vertically centered in inner circle -->
  <text
    x="256" y="200"
    font-family="'Arial Black', 'Arial Bold', Arial, Helvetica, sans-serif"
    font-size="118"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    dominant-baseline="central">?</text>
</svg>
